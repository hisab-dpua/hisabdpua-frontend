<!doctype html>
<html lang="id" data-theme="emerald">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sanding 2 Metode — 1 Kota</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-200">
  <div class="navbar bg-base-100 shadow-sm">
    <div class="flex-1">
      <a href="index.html" class="btn btn-ghost text-lg">🌙 Sanding Metode</a>
    </div>
    <div class="flex-none gap-2">
      <a href="history.html" class="btn btn-sm btn-ghost">Riwayat</a>
      <span id="user-greet" class="text-sm text-base-content/70"></span>
      <button onclick="logout()" class="btn btn-sm btn-ghost">Logout</button>
    </div>
  </div>

  <main class="container mx-auto p-4 max-w-5xl">
    <h1 class="text-2xl font-bold mb-4">Hisab Awal Bulan — Dua Metode Sandingan</h1>

    <form id="hisab-form" class="card bg-base-100 shadow p-6 mb-6 grid grid-cols-1 md:grid-cols-4 gap-4">
      <label class="form-control">
        <span class="label-text">Bulan Hijri</span>
        <select name="month" class="select select-bordered" required>
          <option value="1">1 — Muharram</option>
          <option value="2">2 — Safar</option>
          <option value="3">3 — Rabiul Awal</option>
          <option value="4">4 — Rabiul Akhir</option>
          <option value="5">5 — Jumadil Awal</option>
          <option value="6">6 — Jumadil Akhir</option>
          <option value="7">7 — Rajab</option>
          <option value="8">8 — Syakban</option>
          <option value="9">9 — Ramadan</option>
          <option value="10">10 — Syawal</option>
          <option value="11">11 — Zulkaidah</option>
          <option value="12">12 — Zulhijah</option>
        </select>
      </label>

      <label class="form-control">
        <span class="label-text">Tahun Hijri</span>
        <input type="number" name="year" class="input input-bordered" value="1448" min="1300" max="1600" required>
      </label>

      <label class="form-control md:col-span-2">
        <span class="label-text">Kota</span>
        <select name="city" id="city-select" class="select select-bordered" required>
          <option value="">Memuat daftar kota…</option>
        </select>
      </label>

      <label class="form-control">
        <span class="label-text">Elevasi (m)</span>
        <input type="number" name="elevation" class="input input-bordered" value="0" min="0" step="any">
      </label>

      <div class="md:col-span-4 flex gap-2 items-center">
        <button type="submit" class="btn btn-primary">Hitung</button>
        <span id="status" class="text-sm text-base-content/70"></span>
      </div>
    </form>

    <div id="result" class="hidden card bg-base-100 shadow p-6">
      <h2 id="result-title" class="text-xl font-bold mb-2"></h2>
      <p id="result-subtitle" class="text-sm text-base-content/70 mb-4"></p>

      <div class="overflow-x-auto">
        <table class="table table-zebra">
          <thead>
            <tr>
              <th>Parameter</th>
              <th class="text-emerald-700">Irsyadul Murid</th>
              <th class="text-amber-700">Ad-Durr Al-Anīq</th>
            </tr>
          </thead>
          <tbody id="result-body"></tbody>
        </table>
      </div>

      <div class="flex gap-2 mt-4 items-center">
        <button type="button" id="save-btn" class="btn btn-success btn-sm">💾 Simpan ke Riwayat</button>
        <span id="save-status" class="text-sm text-base-content/70"></span>
      </div>

      <details class="mt-4">
        <summary class="cursor-pointer text-sm text-base-content/70">Lihat JSON mentah</summary>
        <pre id="result-json" class="text-xs bg-base-200 p-3 rounded mt-2 overflow-x-auto"></pre>
      </details>
    </div>
  </main>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/compare.js"></script>
</body>
</html>
