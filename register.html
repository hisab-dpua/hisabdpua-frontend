<!doctype html>
<html lang="id" data-theme="emerald">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daftar — Hisab</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-200">
  <div class="navbar bg-base-100 shadow-sm">
    <div class="flex-1"><a href="index.html" class="btn btn-ghost text-lg">🌙 Hisab Awal Bulan</a></div>
  </div>

  <main class="hero py-12">
    <div class="card bg-base-100 shadow w-full max-w-md p-6">
      <h1 class="text-2xl font-bold mb-4">Daftar Akun</h1>
      <form id="register-form" class="flex flex-col gap-3">
        <label class="form-control">
          <span class="label-text">Nama</span>
          <input type="text" name="name" class="input input-bordered" minlength="2" maxlength="255" required>
        </label>
        <label class="form-control">
          <span class="label-text">Email</span>
          <input type="email" name="email" class="input input-bordered" required>
        </label>
        <label class="form-control">
          <span class="label-text">Password (≥ 8 karakter)</span>
          <input type="password" name="password" class="input input-bordered" minlength="8" required>
        </label>
        <button type="submit" class="btn btn-primary">Daftar</button>
        <p id="msg" class="text-sm text-error"></p>
      </form>
      <p class="mt-4 text-sm">
        Sudah punya akun? <a href="login.html" class="link link-primary">Login</a>
      </p>
    </div>
  </main>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const body = {
        name: form.get("name"),
        email: form.get("email"),
        password: form.get("password"),
      };
      const msg = document.getElementById("msg");
      msg.textContent = "";
      try {
        const res = await fetchAPI("/register", { method: "POST", body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) { msg.textContent = data.error || "register gagal"; return; }
        if (data.token) setToken(data.token);
        const redirectMap = { "/hisab": "hisab.html", "/pending-approval": "pending-approval.html" };
        window.location.href = redirectMap[data.redirect] || "pending-approval.html";
      } catch (err) { msg.textContent = err.message; }
    });
  </script>
</body>
</html>
