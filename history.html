<!doctype html>
<html lang="id" data-theme="emerald">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Riwayat Hisab</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-200">
  <div class="navbar bg-base-100 shadow-sm">
    <div class="flex-1">
      <a href="index.html" class="btn btn-ghost text-lg">🌙 Hisab Awal Bulan</a>
    </div>
    <div class="flex-none gap-2">
      <a href="hisab.html" class="btn btn-sm btn-primary">Hitung baru</a>
      <span id="user-greet" class="text-sm text-base-content/70"></span>
      <button onclick="logout()" class="btn btn-sm btn-ghost">Logout</button>
    </div>
  </div>

  <main class="container mx-auto p-4 max-w-5xl">
    <h1 class="text-2xl font-bold mb-4">Riwayat Hisab Anda</h1>
    <div id="status" class="text-sm text-base-content/70 mb-2"></div>

    <div id="empty" class="hidden card bg-base-100 shadow p-6 text-center">
      <p>Belum ada hisab tersimpan. <a href="hisab.html" class="link link-primary">Hitung sekarang</a> lalu klik <b>Simpan</b>.</p>
    </div>

    <div class="overflow-x-auto hidden" id="table-wrap">
      <table class="table table-zebra bg-base-100 shadow">
        <thead>
          <tr>
            <th>Disimpan</th>
            <th>Bulan / Tahun</th>
            <th>Lokasi</th>
            <th>IM ijtima / irtifa</th>
            <th>Aniq ijtima / irtifa</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>

    <details class="mt-6">
      <summary class="cursor-pointer text-sm text-base-content/70">Lihat JSON mentah</summary>
      <pre id="history-json" class="text-xs bg-base-200 p-3 rounded mt-2 overflow-x-auto"></pre>
    </details>
  </main>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/history.js"></script>
</body>
</html>
