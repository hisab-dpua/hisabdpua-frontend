<!doctype html>
<html lang="id" data-theme="alfalak">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Al Falak — Peta Visibilitas Hilal</title>
<script src="assets/theme.js"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link href="assets/theme.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="min-h-screen bg-base-200">
  <div id="app-nav"></div>

  <main class="container mx-auto p-4 max-w-6xl space-y-4">
    <h1 class="text-2xl font-bold">Peta Visibilitas Hilal Global (Al Falak)</h1>

    <form id="alfalak-map-form" class="card glass-panel hover-lift shadow p-4">
      <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 items-end">
        <label class="form-control">
          <span class="label-text">Tahun</span>
          <input type="number" name="year" class="input input-bordered input-sm" value="2026" required>
        </label>
        <label class="form-control">
          <span class="label-text">Bulan</span>
          <input type="number" name="month" class="input input-bordered input-sm" value="3" min="1" max="12" required>
        </label>
        <label class="form-control">
          <span class="label-text">Tanggal</span>
          <input type="number" name="day" class="input input-bordered input-sm" value="19" min="1" max="31" required>
        </label>
        <label class="form-control">
          <span class="label-text">Kriteria</span>
          <select name="criterion" class="select select-bordered select-sm">
            <option value="yallop" selected>Yallop</option>
            <option value="odeh">Odeh</option>
            <option value="mabims">MABIMS 2021</option>
            <option value="turkey">Turkey</option>
          </select>
        </label>
        <button type="submit" class="btn btn-primary btn-sm">Gambar Peta</button>
      </div>
      <p class="text-xs text-base-content/60 mt-2">Default: hari konjungsi 19 Mar 2026. Resolusi 2°/sel.</p>
    </form>

    <div id="status" class="hidden"></div>

    <div class="card glass-panel hover-lift shadow p-2">
      <div id="map" style="height: 60vh; min-height: 420px;" class="rounded"></div>
    </div>

    <div class="card glass-panel hover-lift shadow p-4">
      <h2 class="font-semibold mb-2">Legenda Zona</h2>
      <div id="legend" class="flex flex-wrap gap-2 text-xs"></div>
    </div>
  </main>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/alfalak-map.js"></script>
</body>
</html>
