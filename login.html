<!doctype html>
<html lang="id" data-theme="alfalak">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Masuk — Al Falak DPUA</title>
<meta name="description" content="Masuk ke akun Al Falak DPUA.">
<link rel="canonical" href="https://hisab-dpua.github.io/hisabdpua-frontend/login.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Al Falak DPUA">
<meta property="og:title" content="Masuk — Al Falak DPUA">
<meta property="og:description" content="Masuk ke akun Al Falak DPUA.">
<meta property="og:url" content="https://hisab-dpua.github.io/hisabdpua-frontend/login.html">
<meta property="og:image" content="https://hisab-dpua.github.io/hisabdpua-frontend/assets/logo-alfalak.png">
<meta property="og:locale" content="id_ID">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Masuk — Al Falak DPUA">
<meta name="twitter:description" content="Masuk ke akun Al Falak DPUA.">
<meta name="twitter:image" content="https://hisab-dpua.github.io/hisabdpua-frontend/assets/logo-alfalak.png">
<script src="assets/theme.js"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link href="assets/theme.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-base-200">
  <div class="navbar bg-base-100 shadow-sm px-2 sm:px-4">
    <div class="flex-1"><a href="index.html" class="btn btn-ghost text-base sm:text-lg gap-2 px-1 sm:px-2"><img src="assets/logo-alfalak.png" alt="Al Falak DPUA" class="w-7 h-7 rounded"><span class="font-bold">Al Falak DPUA</span></a></div>
  </div>

  <main class="flex justify-center px-4 py-12">
    <div class="card bg-base-100 shadow w-full max-w-md p-6">
      <h1 class="text-2xl font-bold mb-4">Login</h1>
      <form id="login-form" class="flex flex-col gap-3">
        <label class="form-control">
          <span class="label-text">Email</span>
          <input type="email" name="email" class="input input-bordered" required>
        </label>
        <label class="form-control">
          <span class="label-text">Password</span>
          <input type="password" name="password" class="input input-bordered" minlength="8" required>
        </label>
        <button type="submit" class="btn btn-primary">Login</button>
        <p id="msg" class="text-sm text-error"></p>
      </form>
      <p class="mt-4 text-sm">
        Belum punya akun? <a href="register.html" class="link link-primary">Daftar</a>
      </p>
    </div>
  </main>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const body = { email: form.get("email"), password: form.get("password") };
      const msg = document.getElementById("msg");
      msg.textContent = "";
      try {
        const res = await fetchAPI("/login", { method: "POST", body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) { msg.textContent = data.error || "login gagal"; return; }
        if (data.token) setToken(data.token);
        const redirectMap = { "/hisab": "hisab.html", "/pending-approval": "pending-approval.html" };
        window.location.href = redirectMap[data.redirect] || "hisab.html";
      } catch (err) { msg.textContent = err.message; }
    });
  </script>
<script>window.addEventListener("load",()=>{setTimeout(()=>{document.title="W="+document.documentElement.scrollWidth+"/"+window.innerWidth+"/card="+(document.querySelector(".card")?.offsetWidth||0)},300)})</script></body>
</html>
