<!doctype html>
<html lang="id" data-theme="emerald">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Al Falak — Hisab Hilal &amp; Kriteria</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-200">
  <div id="app-nav"></div>

  <main class="container mx-auto p-4 max-w-5xl space-y-6">
    <h1 class="text-2xl font-bold">Hisab Hilal &amp; Kriteria Rukyat (Al Falak)</h1>
    <p class="text-sm text-base-content/70">Engine VB6 Al Falak DPUA (port presisi). 9 kriteria visibilitas + ephemeris saat magrib.</p>

    <form id="alfalak-hilal-form" class="card bg-base-100 shadow p-5">
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 items-end">
        <label class="form-control">
          <span class="label-text">Lintang (°)</span>
          <input type="number" step="any" name="latitude" class="input input-bordered input-sm" value="-7.0744" required>
        </label>
        <label class="form-control">
          <span class="label-text">Bujur (°)</span>
          <input type="number" step="any" name="longitude" class="input input-bordered input-sm" value="106.5314" required>
        </label>
        <label class="form-control">
          <span class="label-text">Elevasi (m)</span>
          <input type="number" step="any" name="elevation" class="input input-bordered input-sm" value="10" required>
        </label>
        <label class="form-control">
          <span class="label-text">Zona Waktu (UTC±)</span>
          <input type="number" step="any" name="timezone" class="input input-bordered input-sm" value="7" required>
        </label>
        <label class="form-control">
          <span class="label-text">Tahun</span>
          <input type="number" name="year" class="input input-bordered input-sm" value="2026" required>
        </label>
        <label class="form-control">
          <span class="label-text">Bulan</span>
          <input type="number" name="month" class="input input-bordered input-sm" value="2" min="1" max="12" required>
        </label>
        <label class="form-control">
          <span class="label-text">Tanggal</span>
          <input type="number" name="day" class="input input-bordered input-sm" value="17" min="1" max="31" required>
        </label>
        <button type="submit" class="btn btn-primary btn-sm">Hitung</button>
      </div>
      <p class="text-xs text-base-content/60 mt-2">Default: IIAC Pelabuhan Ratu, malam ijtima 17 Feb 2026.</p>
    </form>

    <div id="status" class="hidden"></div>

    <div id="ephemeris" class="card bg-base-100 shadow p-5 hidden">
      <h2 class="card-title text-lg mb-2">Data Ephemeris (saat magrib)</h2>
      <div id="ephemeris-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 text-sm"></div>
    </div>

    <div id="criteria" class="card bg-base-100 shadow p-5 hidden">
      <h2 class="card-title text-lg mb-2">Kriteria Visibilitas</h2>
      <div class="overflow-x-auto">
        <table class="table table-sm">
          <thead><tr><th>Kriteria</th><th>Status</th><th>Keterangan</th></tr></thead>
          <tbody id="criteria-rows"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/alfalak-hilal.js"></script>
</body>
</html>
