<!doctype html>
<html lang="id" data-theme="emerald">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hisab Hilal &amp; Data Lengkap — Al Falak DPUA</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>@media print { .no-print { display:none } .card { box-shadow:none; border:1px solid #ddd } }</style>
</head>
<body class="min-h-screen bg-base-200">
  <div id="app-nav"></div>

  <main class="container mx-auto p-4 max-w-6xl space-y-6">
    <h1 class="text-2xl font-bold no-print">Hisab Hilal &amp; Data Lengkap (Al Falak)</h1>

    <form id="alfalak-hilal-form" class="card bg-base-100 shadow p-5 no-print space-y-4">
      <!-- LOKASI -->
      <fieldset class="border border-base-300 rounded-lg p-3">
        <legend class="text-sm font-semibold px-1">Lokasi (Markaz)</legend>
        <div class="grid sm:grid-cols-2 gap-3 items-end">
          <label class="form-control sm:col-span-2"><span class="label-text">Cari kota</span>
            <input list="city-list" id="city-search" class="input input-bordered input-sm" placeholder="Ketik nama kota: Jakarta, Mekkah, London…" autocomplete="off">
            <datalist id="city-list"></datalist>
          </label>
          <label class="form-control"><span class="label-text">Nama lokasi</span>
            <input type="text" name="loc_name" class="input input-bordered input-sm" placeholder="IIAC Pelabuhan Ratu"></label>
          <label class="form-control"><span class="label-text">Negara</span>
            <input type="text" name="country" class="input input-bordered input-sm" placeholder="Indonesia"></label>
          <label class="form-control"><span class="label-text">Lintang (°)</span>
            <input type="number" step="any" name="latitude" class="input input-bordered input-sm" value="-7.0744" required></label>
          <label class="form-control"><span class="label-text">Bujur (°)</span>
            <input type="number" step="any" name="longitude" class="input input-bordered input-sm" value="106.5314" required></label>
          <label class="form-control"><span class="label-text">Elevasi (m)</span>
            <input type="number" step="any" name="elevation" class="input input-bordered input-sm" value="10" required></label>
          <label class="form-control"><span class="label-text">Zona Waktu (UTC±)</span>
            <input type="number" step="any" name="timezone" class="input input-bordered input-sm" value="7" required></label>
        </div>
      </fieldset>

      <!-- TANGGAL -->
      <fieldset class="border border-base-300 rounded-lg p-3">
        <legend class="text-sm font-semibold px-1">Tanggal Perhitungan</legend>
        <div class="flex flex-wrap gap-3 items-end">
          <div class="join">
            <button type="button" id="cal-greg" class="btn btn-xs join-item btn-active">Masehi</button>
            <button type="button" id="cal-hijri" class="btn btn-xs join-item">Hijriah</button>
          </div>
          <label class="form-control"><span class="label-text">Tahun</span>
            <input type="number" name="year" class="input input-bordered input-sm w-24" value="2026" required></label>
          <label class="form-control"><span class="label-text">Bulan</span>
            <input type="number" name="month" class="input input-bordered input-sm w-20" value="2" min="1" max="12" required></label>
          <label class="form-control"><span class="label-text">Tanggal</span>
            <input type="number" name="day" class="input input-bordered input-sm w-20" value="17" min="1" max="31" required></label>
          <span id="cal-hint" class="text-xs text-base-content/60"></span>
        </div>
      </fieldset>

      <div class="flex items-center gap-3">
        <button type="submit" class="btn btn-primary btn-sm">Hitung</button>
        <span class="text-xs text-base-content/60">Default: IIAC Pelabuhan Ratu, malam ijtima 17 Feb 2026.</span>
      </div>
    </form>

    <div id="status" class="hidden"></div>

    <div id="results" class="hidden space-y-6">
      <!-- Toolbar export -->
      <div class="flex flex-wrap gap-2 no-print">
        <button type="button" id="btn-txt" class="btn btn-sm btn-outline">Simpan TXT</button>
        <button type="button" id="btn-csv" class="btn btn-sm btn-outline">Simpan CSV</button>
        <button type="button" id="btn-print" class="btn btn-sm btn-outline" onclick="window.print()">Cetak</button>
      </div>

      <!-- Ringkasan + visualisasi sabit -->
      <div class="grid md:grid-cols-3 gap-4">
        <div class="card bg-base-100 shadow p-4 md:col-span-2">
          <h2 class="card-title text-base mb-2">Ringkasan Hilal</h2>
          <div id="summary-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 text-sm"></div>
        </div>
        <div class="card bg-base-100 shadow p-4 flex flex-col items-center justify-center">
          <h2 class="card-title text-base mb-2 self-start">Bentuk Sabit</h2>
          <div id="moon-viz"></div>
          <div id="moon-viz-caption" class="text-xs text-base-content/60 mt-2 text-center"></div>
        </div>
      </div>

      <!-- Tabel ephemeris penuh -->
      <div class="card bg-base-100 shadow p-4">
        <h2 class="card-title text-base mb-2">Data Ephemeris Lengkap</h2>
        <div class="overflow-x-auto">
          <table class="table table-xs">
            <thead><tr><th>Parameter</th><th class="text-right">Geosentrik</th><th class="text-right">Toposentrik</th></tr></thead>
            <tbody id="ephemeris-rows"></tbody>
          </table>
        </div>
      </div>

      <!-- Kriteria detail -->
      <div class="card bg-base-100 shadow p-4">
        <h2 class="card-title text-base mb-2">Kriteria Visibilitas (Detail)</h2>
        <div class="overflow-x-auto">
          <table class="table table-sm">
            <thead><tr><th>Kriteria</th><th>Status</th><th class="text-right">Detail</th></tr></thead>
            <tbody id="criteria-rows"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/alfalak-hilal.js"></script>
</body>
</html>
