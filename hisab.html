<!doctype html>
<html lang="id" data-theme="emerald">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laporan Hisab Multi-Kota</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-200">
  <div id="app-nav"></div>

  <main class="container mx-auto p-4 max-w-7xl space-y-6">

    <!-- Form bar (menu atas) -->
    <form id="hisab-form" class="card bg-base-100 shadow p-5">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
        <label class="form-control">
          <span class="label-text">Metode</span>
          <select name="method" class="select select-bordered select-sm" required>
            <option value="im">Irsyadul Murid</option>
            <option value="aniq">Ad-Durr Al-Anīq</option>
          </select>
        </label>

        <label class="form-control">
          <span class="label-text">Bulan Hijri</span>
          <select name="month" class="select select-bordered select-sm" required>
            <option value="1">1 — Muharram</option>
            <option value="2">2 — Safar</option>
            <option value="3">3 — Rabiul Awal</option>
            <option value="4">4 — Rabiul Akhir</option>
            <option value="5">5 — Jumadil Awal</option>
            <option value="6">6 — Jumadil Akhir</option>
            <option value="7">7 — Rajab</option>
            <option value="8">8 — Syakban</option>
            <option value="9">9 — Ramadan</option>
            <option value="10">10 — Syawal</option>
            <option value="11">11 — Zulkaidah</option>
            <option value="12">12 — Zulhijah</option>
          </select>
        </label>

        <label class="form-control">
          <span class="label-text">Tahun Hijri</span>
          <input type="number" name="year" class="input input-bordered input-sm" value="1448" min="1300" max="1600" required>
        </label>

        <button type="submit" id="submit-btn" class="btn btn-primary">Hitung Laporan</button>
      </div>

      <details class="mt-3">
        <summary class="cursor-pointer text-sm font-medium">Pilih kota (default: 16)</summary>
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-2 max-h-48 overflow-y-auto p-2 bg-base-200 rounded mt-2" id="city-checkboxes">
          <span class="text-sm text-base-content/60">Memuat…</span>
        </div>
        <div class="flex flex-wrap gap-1 mt-2">
          <button type="button" id="select-default" class="btn btn-xs btn-ghost">16 default</button>
          <button type="button" id="select-all" class="btn btn-xs btn-ghost">Semua</button>
          <button type="button" id="select-none" class="btn btn-xs btn-ghost">Kosong</button>
        </div>
      </details>

      <span id="status" class="text-sm text-base-content/70 block mt-2"></span>
    </form>

    <!-- Hasil (lebar penuh) -->
    <div id="empty-state" class="card bg-base-100 shadow p-12 text-center text-base-content/50">
      Atur metode & bulan/tahun di atas, lalu klik <b>Hitung Laporan</b>.
    </div>

    <div id="result" class="hidden card bg-base-100 shadow p-6">
          <div class="flex flex-wrap items-start justify-between gap-2 mb-3">
            <div>
              <h2 id="result-title" class="text-xl font-bold"></h2>
              <p id="result-ijtima" class="text-sm text-base-content/70"></p>
            </div>
            <button type="button" id="export-csv" class="btn btn-outline btn-sm gap-1">⬇ Export CSV</button>
          </div>

          <div class="overflow-x-auto">
            <table class="table table-zebra table-sm whitespace-nowrap">
              <thead>
                <tr>
                  <th>NO</th>
                  <th>Kota</th>
                  <th>Ghurub asy-Syams</th>
                  <th>Ghurub al-Qomar</th>
                  <th>Ijtima' (LT)</th>
                  <th id="th-day0">Irtifa (H)</th>
                  <th>Elongasi</th>
                  <th id="th-day1">Irtifa (H+1)</th>
                  <th>MABIMS</th>
                </tr>
              </thead>
              <tbody id="result-body"></tbody>
            </table>
          </div>

          <details class="mt-4">
            <summary class="cursor-pointer text-sm text-base-content/70">Lihat JSON mentah</summary>
            <pre id="result-json" class="text-xs bg-base-200 p-3 rounded mt-2 overflow-x-auto"></pre>
          </details>
        </div>
  </main>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/hisab.js"></script>
</body>
</html>
